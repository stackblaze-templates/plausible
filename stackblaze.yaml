databases:
  - name: plausible-db
    databaseName: plausible
    user: plausible

services:
  - type: web
    name: plausible
    runtime: docker
    plan: starter
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: plausible-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: BASE_URL
        value: https://plausible.example.com
